<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Kartu Manis untuk Pacar 💖</title>
        <style>
            :root{
                  --bg:#0f0b2d;
                        --card:#151030;
                              --accent:#ff6b9a;
                                    --accent-2:#ffb86b;
                                          --glass: rgba(255,255,255,0.06);
                                                --soft: rgba(255,255,255,0.04);
                                                      --glass-2: rgba(255,255,255,0.03);
                                                            --text:#f6f5ff;
                                                                  --muted: #cfcbe0;
                                                                        font-family: 'Helvetica Neue', Inter, Arial, sans-serif;
                                                                            }
                                                                                *{box-sizing:border-box}
                                                                                    html,body{height:100%;margin:0;background:radial-gradient( circle at 10% 10%, rgba(255,107,154,0.06), transparent 10%), radial-gradient(circle at 90% 90%, rgba(255,184,107,0.04), transparent 10%), var(--bg); color:var(--text)}
                                                                                        .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}

                                                                                            .card{
                                                                                                  width:100%;max-width:900px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:18px;padding:28px;box-shadow:0 10px 40px rgba(2,2,10,0.6);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:center
                                                                                                      }

                                                                                                          /* Left - message */
                                                                                                              .left{padding:14px}
                                                                                                                  h1{font-size:2.05rem;margin:0 0 8px 0;letter-spacing:0.2px}
                                                                                                                      .subtitle{color:var(--muted);margin:0 0 18px 0}
                                                                                                                          .message-box{background:linear-gradient(180deg,var(--glass),var(--glass-2));border-radius:12px;padding:18px;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.05rem}

                                                                                                                              .controls{display:flex;gap:10px;margin-top:16px}
                                                                                                                                  button{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:0;padding:10px 14px;border-radius:10px;color:white;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,154,0.14)}
                                                                                                                                      button.ghost{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.06);box-shadow:none}

                                                                                                                                          /* Right - portrait & hearts */
                                                                                                                                              .right{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}
                                                                                                                                                  .portrait{width:100%;max-width:320px;border-radius:14px;padding:18px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:inset 0 1px 0 rgba(255,255,255,0.02), 0 8px 30px rgba(2,2,10,0.5);display:flex;flex-direction:column;align-items:center}
                                                                                                                                                      .avatar{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:3rem;color:white;box-shadow:0 8px 30px rgba(255,107,154,0.18)}
                                                                                                                                                          .name{margin-top:12px;font-weight:700}
                                                                                                                                                              .small{color:var(--muted);font-size:.9rem}

                                                                                                                                                                  /* hearts animation */
                                                                                                                                                                      .hearts{position:absolute;left:0;top:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
                                                                                                                                                                          .heart{position:absolute;width:18px;height:18px;transform:rotate(-45deg);opacity:0;animation:floatUp 4s linear infinite}
                                                                                                                                                                              .heart:before,.heart:after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));}
                                                                                                                                                                                  .heart:before{top:-9px;left:0}
                                                                                                                                                                                      .heart:after{left:9px;top:0}
                                                                                                                                                                                          @keyframes floatUp{
                                                                                                                                                                                                0%{transform:translateY(0) scale(0.6) rotate(-45deg);opacity:0}
                                                                                                                                                                                                      10%{opacity:1}
                                                                                                                                                                                                            50%{opacity:1}
                                                                                                                                                                                                                  100%{transform:translateY(-420px) scale(1) rotate(-45deg);opacity:0}
                                                                                                                                                                                                                      }

                                                                                                                                                                                                                          /* typewriter for messages */
                                                                                                                                                                                                                              .typewriter{font-family: 'Courier New', monospace;white-space:pre-wrap;word-break:break-word}

                                                                                                                                                                                                                                  /* responsive */
                                                                                                                                                                                                                                      @media (max-width:880px){
                                                                                                                                                                                                                                            .card{grid-template-columns:1fr;max-width:700px}
                                                                                                                                                                                                                                                  .portrait{max-width:100%}
                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                          /* small footer */
                                                                                                                                                                                                                                                              .footer{margin-top:12px;color:var(--muted);font-size:.85rem;text-align:center}
                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                  <div class="wrap">
                                                                                                                                                                                                                                                                      <div class="card" role="article" aria-label="Kartu untuk pacar">

                                                                                                                                                                                                                                                                            <div class="left">
                                                                                                                                                                                                                                                                                    <h1>Untukmu, <span id="toName">Sayang</span> 💌</h1>
                                                                                                                                                                                                                                                                                            <p class="subtitle">Buka pesan ini kapan pun kamu rindu.</p>

                                                                                                                                                                                                                                                                                                    <div class="message-box" id="messageBox">
                                                                                                                                                                                                                                                                                                              <div id="message" class="typewriter">Tekan tombol "Tampilkan Pesan" untuk melihat kejutan manis... 😊</div>
                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                              <div class="controls" role="group" aria-label="Kontrol kartu">
                                                                                                                                                                                                                                                                                                                                        <button id="showBtn">Tampilkan Pesan</button>
                                                                                                                                                                                                                                                                                                                                                  <button class="ghost" id="nextBtn">Kata-kata lain</button>
                                                                                                                                                                                                                                                                                                                                                            <button class="ghost" id="downloadBtn">Simpan sebagai HTML</button>
                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                            <div class="footer">Dibuat dengan ♥ oleh kamu — ubah teks dan nama sesukamu.</div>
                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                        <div class="right">
                                                                                                                                                                                                                                                                                                                                                                                                <div class="portrait">
                                                                                                                                                                                                                                                                                                                                                                                                          <div class="avatar" id="avatar">💖</div>
                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="name" id="displayName">Untuk Pacarku</div>
                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="small">Hari spesial? ulang tahun? atau cuma mau ngingetin aku sayang?</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="hearts" id="hearts"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              // --- Pesan yang bisa kamu ganti / tambahkan ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const messages = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Halo sayang!\nSetiap hari bersamamu terasa spesial. Terima kasih sudah jadi alasan senyumku.",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "Saat kita jauh, aku tetap merasakan hangatnya pelukanmu di hati. Kangen kamu. ❤️",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    "Kamu adalah playlist favoritku, episode terbaik hidupku, dan alasan aku bersemangat tiap pagi.",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          "Terima kasih sudah sabar, tertawa, dan berjalan bareng. Aku janji akan selalu ada buat kamu.",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "Cinta itu sederhana: aku + kamu = selamanya (setidaknya di daftar belanjaanku ada kamu). 😄"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Nama default — ubah langsung di sini atau pakai prompt di runtime
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let toName = 'Sayang';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let current = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const msgEl = document.getElementById('message');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const showBtn = document.getElementById('showBtn');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const nextBtn = document.getElementById('nextBtn');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const hearts = document.getElementById('hearts');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const toNameEl = document.getElementById('toName');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const displayName = document.getElementById('displayName');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const downloadBtn = document.getElementById('downloadBtn');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Update name places
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function setName(name){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          toName = name || 'Sayang';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                toNameEl.textContent = toName;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      displayName.textContent = `Untuk ${toName}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // Typewriter effect
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function typeText(text, speed=18){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        msgEl.textContent = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              let i=0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    return new Promise((res)=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const t = setInterval(()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      msgEl.textContent += text.charAt(i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                i++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if(i>text.length-1){ clearInterval(t); res(); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }, speed);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function showMessage(i){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      showBtn.disabled = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            await typeText(messages[i]);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  showBtn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          showBtn.addEventListener('click', async ()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                current = current % messages.length;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      await showMessage(current);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            spawnHearts(8);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    nextBtn.addEventListener('click', ()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          current = (current + 1) % messages.length;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // quick preview without typewriter
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      msgEl.textContent = messages[current];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // simple hearts spawner
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function spawnHearts(n){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        for(let i=0;i<n;i++){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const h = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        h.className = 'heart';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // random position across card
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        h.style.left = Math.random()*90 + '%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                h.style.bottom = Math.random()*10 + 'px';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        h.style.width = (12 + Math.random()*24) + 'px';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                h.style.height = h.style.width;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        h.style.animationDuration = (3 + Math.random()*3) + 's';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                hearts.appendChild(h);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // remove after animation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setTimeout(()=>{ h.remove() }, 5000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // Download current page as HTML file
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  downloadBtn.addEventListener('click', ()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const html = `<!doctype html>\n${document.documentElement.outerHTML}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const blob = new Blob([html], {type: 'text/html'});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const url = URL.createObjectURL(blob);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const a = document.createElement('a');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                a.href = url; a.download = `kartu-untuk-${toName.replace(/\s+/g,'-').toLowerCase() || 'sayang'}.html`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      a.click();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            URL.revokeObjectURL(url);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Ask user for a name when first opened (optional)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        setTimeout(()=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const name = prompt('Masukkan nama pacarmu (biarkan kosong untuk "Sayang"):', toName);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(name !== null) setName(name.trim());
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 600);
